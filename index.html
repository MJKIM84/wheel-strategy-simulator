const fmt = (v) => {
  if (v == null || isNaN(v)) return "$0";
  const abs = Math.abs(v), s = v < 0 ? "-" : "";
  if (abs >= 1e6) return s+"$"+(abs/1e6).toFixed(2)+"M";
  if (abs >= 1e3) return s+"$"+(abs/1e3).toFixed(1)+"K";
  return s+"$"+abs.toFixed(0);
};
const pct = (v) => (v*100).toFixed(1)+"%";
const cagr = (f, i, y) => y>0 ? Math.pow(f/i, 1/y) - 1 : 0;

function runSim(p) {
  const stk = p.stock, months = p.years * 12, SPLIT = 0.5;
  const sStd = stk.std*(1+p.volAdj), sJSigma = stk.jSigma*(1+p.volAdj);
  let sP=stk.price, sBasis=sP;
  let sh=Math.floor((p.capital*SPLIT)/sP);
  let cash=p.capital*SPLIT;
  let tfSh=sh, tfCash=cash;
  let reCurrV=p.reStartVal, divSh=p.tradingStartVal/sP;
  let taxBal=0, stag=0, gr=0, ug=0;
  const randn=()=>{let u=0,v=0;while(!u)u=Math.random();v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const poisson=(lam)=>{let L=Math.exp(-lam),k=0,pp=1;do{k++;pp*=Math.random();}while(pp>L);return k-1;};
  const history=[];
  for(let m=0;m<=months;m++){
    if(m>0&&m%12===1) taxBal=0;
    if(m>0){ const rent=reCurrV*(p.reRental/12); reCurrV*=(1+p.reReturn/12); divSh+=rent/sP; }
    const interest=Math.max(0,sh*sP-cash)*(p.marginRate/12);
    cash-=interest;
    const effC=cash*(1+p.marginUsage), tfEffC=tfCash*(1+p.marginUsage);
    const sTight=stag>=p.stagnantThresh?stk.stagTight:0;
    const callS=Math.max(sP*(stk.callStrike-sTight),sBasis*1.05), putS=sP*(stk.putStrike+sTight);
    const pQ=Math.floor((effC*(1-p.reservePct))/(putS*100));
    const cQ=Math.floor((sh*p.coverRatio)/100);
    const tfPQ=Math.floor((tfEffC*(1-p.reservePct))/(putS*100));
    const totalBal=sh*sP+cash;
    const tfBal=tfSh*sP+tfCash;
    const bhVal=(p.capital)/stk.baseline*sP;
    const divStockVal=divSh*sP;
    let reDiv, bhNet;
    if(m===months){ const sale=reCurrV*0.95-5000; const netRe=sale-Math.max(0,sale-p.reStartVal)*p.taxRate; reDiv=netRe+divStockVal; bhNet=bhVal-Math.max(0,bhVal-p.capital)*p.taxRate; }
    else{ reDiv=reCurrV+divStockVal; bhNet=bhVal; }
    history.push({ month:m, stockPx:+sP.toFixed(2), wheel:totalBal, taxFree:tfBal, reDiv, buyHold:bhNet, sh, cash, taxBal, prem:gr, cQ, pQ, assignment:"" });
    if(m<months){
      const ret=randn()*sStd+Math.log(p.target/stk.baseline)/months+(poisson(stk.lambda/12)>0?randn()*sJSigma+stk.jMu:0);
      stag=Math.abs(ret)<stk.stagThresh?stag+1:0;
      const volMult=(1+Math.abs(Math.min(0,ret))*stk.downMult)*(stag>=p.stagnantThresh?stk.stagPremCut:1);
      ug=sP*stk.premRate*volMult*p.premOffset;
      gr=Math.round((cQ+pQ)*100*ug);
      sP*=(1+ret);
      taxBal+=gr*p.taxRate;
      cash+=gr*(1-p.taxRate);
      tfCash+=(tfSh/100*p.coverRatio+tfPQ)*100*ug;
      let evs=[];
      if(sP>callS*1.01){cash+=cQ*100*callS;sh-=cQ*100;evs.push(stk.ticker+" Call");}
      else if(sP<putS*0.99){sh+=pQ*100;cash-=pQ*100*putS;sBasis=putS;evs.push(stk.ticker+" Put");}
      history[history.length-1].assignment=evs.join(", ")||"-";
    }
  }
  return history;
}

function runMC(p, runs=25){
  const results=[];
  for(let i=0;i<runs;i++){
    const h=runSim(p); const last=h[h.length-1];
    const monthlyReturns=h.slice(1).map((d,j)=>d.wheel/h[j].wheel-1);
    const avgRet=monthlyReturns.reduce((s,r)=>s+r,0)/monthlyReturns.length;
    const stdRet=Math.sqrt(monthlyReturns.reduce((s,r)=>s+Math.pow(r-avgRet,2),0)/monthlyReturns.length);
    const sharpe=stdRet>0?(avgRet/stdRet)*Math.sqrt(12):0;
    let peak=p.capital, maxDD=0;
    h.forEach(d=>{if(d.wheel>peak)peak=d.wheel; const dd=(peak-d.wheel)/peak; if(dd>maxDD)maxDD=dd;});
    results.push({ run:i+1, wheel:last.wheel, taxFree:last.taxFree, reDiv:last.reDiv, buyHold:last.buyHold,
      wheelCAGR:cagr(last.wheel,p.capital,p.years), tfCAGR:cagr(last.taxFree,p.capital,p.years),
      reCAGR:cagr(last.reDiv,p.capital,p.years), bhCAGR:cagr(last.buyHold,p.capital,p.years),
      sharpe, maxDD });
  }
  const avg=(arr,k)=>arr.reduce((s,x)=>s+x[k],0)/arr.length;
  const winRate=results.filter(r=>r.wheel>r.buyHold).length/results.length;
  return { results, winRate, avg:{ wheel:avg(results,'wheel'), taxFree:avg(results,'taxFree'), reDiv:avg(results,'reDiv'), buyHold:avg(results,'buyHold'),
    wheelCAGR:avg(results,'wheelCAGR'), tfCAGR:avg(results,'tfCAGR'), reCAGR:avg(results,'reCAGR'), bhCAGR:avg(results,'bhCAGR'),
    sharpe:avg(results,'sharpe'), maxDD:avg(results,'maxDD') }};
}

function downloadCSV(data, filename) {
  if(!data.length) return;
  const keys=Object.keys(data[0]);
  const csv=[keys.join(","), ...data.map(r=>keys.map(k=>{const v=r[k];return typeof v==='string'&&v.includes(',')?'"'+v+'"':v;}).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function encodeParams(stockKey, params, mcRuns) {
  const p={s:stockKey,y:params.years,c:params.capital,t:params.target,tr:params.taxRate,
    po:params.premOffset,va:params.volAdj,cr:params.coverRatio,rp:params.reservePct,
    rs:params.reStartVal,mr:mcRuns};
  return btoa(JSON.stringify(p));
}
function decodeParams(hash) {
  try{const p=JSON.parse(atob(hash));return p;}catch(e){return null;}
}

function App() {
  const [dark,setDark]=useState(()=>{const s=localStorage.getItem("theme");return s?s==="dark":true;});
  const C=dark?C_DARK:C_LIGHT;
  useEffect(()=>{document.body.className=dark?"":"light";localStorage.setItem("theme",dark?"dark":"light");},[dark]);

  const [tab,setTab] = useState("growth");
  const [stockKey,setStockKey] = useState("SOFI");
  const [stock2Key,setStock2Key] = useState("NONE");
  const [splitRatio,setSplitRatio] = useState(0.7);
  const stk = STOCKS[stockKey];
  const stk2 = stock2Key!=="NONE"?STOCKS[stock2Key]:null;
  const [params,setParams] = useState({
    years:5, capital:1000000, marginUsage:0, marginRate:0.08, taxRate:0.285,
    target:60, coverRatio:1, reservePct:0, premOffset:0.7, volAdj:0.3, stagnantThresh:3,
    reStartVal:700000, tradingStartVal:300000, reReturn:0.04, reRental:0.04 });
  const [target2,setTarget2]=useState(500);
  const [mcRuns,setMcRuns]=useState(25);
  const [simKey,setSimKey]=useState(0);
  const [panelOpen,setPanelOpen]=useState(true);
  const set=k=>v=>setParams(p=>({...p,[k]:v}));

  useEffect(()=>{
    const hash=window.location.hash.slice(1);
    if(hash){const d=decodeParams(hash);if(d){
      setStockKey(d.s||"SOFI");
      setParams(p=>({...p,years:d.y||5,capital:d.c||1000000,target:d.t||60,taxRate:d.tr||0.285,
        premOffset:d.po||0.7,volAdj:d.va||0.3,coverRatio:d.cr||1,reservePct:d.rp||0,reStartVal:d.rs||700000}));
      setMcRuns(d.mr||25);
    }}
  },[]);

  const simParams = useMemo(()=>({...params, stock:stk}),[params,stk]);
  const simParams2 = useMemo(()=>stk2?({...params, stock:stk2, target:target2, capital:params.capital*(1-splitRatio)}):null,[params,stk2,target2,splitRatio]);
  const changeStock=(key)=>{setStockKey(key);setParams(p=>({...p,target:STOCKS[key].target}));};
  const changeStock2=(key)=>{setStock2Key(key);if(key!=="NONE")setTarget2(STOCKS[key].target);};

  const mainParams = useMemo(()=>stk2?{...simParams,capital:params.capital*splitRatio}:simParams,[simParams,stk2,splitRatio]);
  const single = useMemo(()=>runSim(mainParams),[mainParams,simKey]);
  const single2 = useMemo(()=>simParams2?runSim(simParams2):null,[simParams2,simKey]);
  const mc = useMemo(()=>runMC(mainParams,mcRuns),[mainParams,mcRuns,simKey]);

  const combined = useMemo(()=>{
    if(!single2) return single;
    return single.map((d,i)=>{const d2=single2[i];return{...d,
      wheel:d.wheel+d2.wheel, taxFree:d.taxFree+d2.taxFree,
      buyHold:d.buyHold+d2.buyHold, stock2Px:d2.stockPx};});
  },[single,single2]);

  const last = combined[combined.length-1];
  const prems = single.filter(d=>d.month>0).map(d=>({month:d.month,prem:d.prem}));
  const totalPrem = prems.reduce((s,d)=>s+d.prem,0);
  const assigns = single.filter(d=>d.assignment&&d.assignment!=="-");

  const shareLink=useCallback(()=>{
    const hash=encodeParams(stockKey,params,mcRuns);
    const url=window.location.origin+window.location.pathname+"#"+hash;
    navigator.clipboard.writeText(url);
    alert("Link copied!");
  },[stockKey,params,mcRuns]);

  const exportLedgerCSV=()=>{
    downloadCSV(single.map(r=>({Month:r.month,Price:r.stockPx,Shares:r.sh,CC:r.cQ,CSP:r.pQ,Cash:Math.round(r.cash),
      Wheel:Math.round(r.wheel),TaxFree:Math.round(r.taxFree),"RE+Div":Math.round(r.reDiv),"B&H":Math.round(r.buyHold),Event:r.assignment})),
      stk.ticker+"_ledger.csv");
  };
  const exportMcCSV=()=>{
    downloadCSV(mc.results.map(r=>({Run:r.run,Wheel:Math.round(r.wheel),TaxFree:Math.round(r.taxFree),"RE+Div":Math.round(r.reDiv),"B&H":Math.round(r.buyHold),
      WheelCAGR:pct(r.wheelCAGR),Sharpe:r.sharpe.toFixed(2),MaxDD:pct(r.maxDD)})),
      stk.ticker+"_mc_"+mcRuns+"runs.csv");
  };

  return (
    <div style={{padding:"20px 16px",maxWidth:1260,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:8}}>

          <h1 style={{fontSize:26,fontWeight:800,...(dark?{background:"linear-gradient(135deg,"+C.accent+","+C.tf+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}:{color:"#0f172a"})}}>Wheel Strategy Simulator</h1>
          <span style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>v3.0</span>
        </div>

            {panelOpen?"Hide":"Params"}</button>
        </div>
      </div>
      <p style={{color:C.dim,fontSize:13,marginBottom:20}}>{stk.ticker}{stk2?" + "+stk2.ticker:""} CC + CSP · Monte Carlo · 4-Strategy Comparison</p>

      <div className="main-layout" style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"stretch"}}>
        {/* Params Panel */}
        <div className="params-panel" style={{width:240,flexShrink:0,background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"16px 18px",display:panelOpen?"block":"none"}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:C.accent,display:"inline-block"}} /> Parameters
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>

              <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Stock 1</div>
              <select value={stockKey} onChange={e=>changeStock(e.target.value)} style={{
                width:"100%",padding:"7px 6px",borderRadius:6,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,cursor:"pointer",outline:"none"
              }}>
                {Object.entries(STOCKS).map(([k,v])=><option key={k} value={k} style={{background:C.bg}}>{v.ticker}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Stock 2</div>
              <select value={stock2Key} onChange={e=>changeStock2(e.target.value)} style={{
                width:"100%",padding:"7px 6px",borderRadius:6,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,cursor:"pointer",outline:"none"
              }}>
                <option value="NONE" style={{background:C.bg}}>None</option>
                {Object.entries(STOCKS).filter(([k])=>k!==stockKey).map(([k,v])=><option key={k} value={k} style={{background:C.bg}}>{v.ticker}</option>)}
              </select>
            </div>
          </div>
          {stk2 && <Slider C={C} label="Split (S1)" value={splitRatio} onChange={setSplitRatio} min={0.1} max={0.9} step={0.1} format={v=>Math.round(v*100)+"/"+Math.round((1-v)*100)} />}
          <Slider C={C} label="Years" value={params.years} onChange={set("years")} min={1} max={10} step={1} />
          <Slider C={C} label="Capital" value={params.capital} onChange={set("capital")} min={100000} max={5000000} step={100000} format={fmt} />
          <Slider C={C} label={stk.ticker+" Target"} value={params.target} onChange={set("target")} min={Math.round(stk.price*0.8)} max={Math.round(stk.price*5)} step={stk.price>100?10:5} format={v=>"$"+v} />
          {stk2 && <Slider C={C} label={stk2.ticker+" Target"} value={target2} onChange={setTarget2} min={Math.round(stk2.price*0.8)} max={Math.round(stk2.price*5)} step={stk2.price>100?10:5} format={v=>"$"+v} />}
          <Slider C={C} label="Tax Rate" value={params.taxRate} onChange={set("taxRate")} min={0} max={0.5} step={0.01} format={pct} />
          <Slider C={C} label="Prem Offset" value={params.premOffset} onChange={set("premOffset")} min={0.3} max={1} step={0.05} format={v=>v.toFixed(2)} />
          <Slider C={C} label="Vol Adjust" value={params.volAdj} onChange={set("volAdj")} min={0} max={1} step={0.05} format={v=>"+"+pct(v)} />
          <Slider C={C} label="Cover Ratio" value={params.coverRatio} onChange={set("coverRatio")} min={0.25} max={1} step={0.25} format={pct} />
          <Slider C={C} label="Reserve %" value={params.reservePct} onChange={set("reservePct")} min={0} max={0.5} step={0.05} format={pct} />
          <Slider C={C} label="RE Start" value={params.reStartVal} onChange={set("reStartVal")} min={0} max={2000000} step={50000} format={fmt} />
          <Slider C={C} label="MC Runs" value={mcRuns} onChange={setMcRuns} min={5} max={100} step={5} />
          <button onClick={()=>setSimKey(k=>k+1)} style={{
            width:"100%",padding:"9px 0",marginTop:10,border:"1px solid "+C.accent,borderRadius:8,
            background:C.accent+"15",color:C.accent,cursor:"pointer",fontSize:12,fontWeight:700,
            fontFamily:"'JetBrains Mono',monospace" }}>Re-Roll</button>
        </div>

        {/* Main */}
        <div className="main-content" style={{flex:1,minWidth:0}}>
          <div className="metric-row" style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
            <MetricCard C={C} label="Wheel (After Tax)" value={fmt(last.wheel)} sub={"CAGR "+pct(cagr(last.wheel,params.capital,params.years))} color={C.wheel} />
            <MetricCard C={C} label="Tax-Free" value={fmt(last.taxFree)} sub={"CAGR "+pct(cagr(last.taxFree,params.capital,params.years))} color={C.tf} />
            <MetricCard C={C} label="RE + Dividend" value={fmt(last.reDiv)} sub={"CAGR "+pct(cagr(last.reDiv,params.capital,params.years))} color={C.re} />
            <MetricCard C={C} label="Buy & Hold" value={fmt(last.buyHold)} sub={"CAGR "+pct(cagr(last.buyHold,params.capital,params.years))} color={C.bh} />
          </div>

          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {[["growth","Growth"],["price","Price"],["premium","Premiums"],["mc","Monte Carlo"],["ledger","Ledger"]].map(([k,l])=>(
              <Tab key={k} C={C} active={tab===k} onClick={()=>setTab(k)}>{l}</Tab>
            ))}
          </div>

          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"18px 14px"}}>
            {tab==="growth" && (
              <div>
                <div style={{fontSize:14,fontWeight:700,marginBottom:2,color:C.text}}>Portfolio Value Over Time</div>
                <div style={{fontSize:11,color:C.dim,marginBottom:14}}>Single run · 4 strategies</div>
                <ResponsiveContainer width="100%" height={360}>
                  <ComposedChart data={combined}>
                    <defs><linearGradient id="gW" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.wheel} stopOpacity={0.15}/><stop offset="100%" stopColor={C.wheel} stopOpacity={0}/></linearGradient></defs>
                    <XAxis dataKey="month" stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} />
                    <YAxis stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} tickFormatter={fmt} />
                    <Tooltip content={<CTip C={C}/>} />
                    <Area type="monotone" dataKey="wheel" fill="url(#gW)" stroke="none" />
                    <Line type="monotone" dataKey="wheel" stroke={C.wheel} strokeWidth={2.5} dot={false} name="Wheel" />
                    <Line type="monotone" dataKey="taxFree" stroke={C.tf} strokeWidth={2} dot={false} name="Tax-Free" strokeDasharray="6 3" />
                    <Line type="monotone" dataKey="reDiv" stroke={C.re} strokeWidth={2} dot={false} name="RE+Div" />
                    <Line type="monotone" dataKey="buyHold" stroke={C.bh} strokeWidth={2} dot={false} name="B&H" strokeDasharray="3 3" />
                    <ReferenceLine y={params.capital} stroke={C.muted} strokeDasharray="3 3" />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            )}

            {tab==="price" && (
              <div>
                <div style={{fontSize:14,fontWeight:700,marginBottom:2,color:C.text}}>{stk.ticker} Stock Price Path</div>
                <div style={{fontSize:11,color:C.dim,marginBottom:14}}>Assignments: {assigns.length} events · Target: ${params.target}</div>
                <ResponsiveContainer width="100%" height={360}>
                  <ComposedChart data={combined}>
                    <defs><linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.green} stopOpacity={0.1}/><stop offset="100%" stopColor={C.green} stopOpacity={0}/></linearGradient></defs>
                    <XAxis dataKey="month" stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} />
                    <YAxis stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} tickFormatter={v=>"$"+v} />
                    <Tooltip content={<CTip C={C}/>} />
                    <Area type="monotone" dataKey="stockPx" fill="url(#gP)" stroke="none" />
                    <Line type="monotone" dataKey="stockPx" stroke={C.green} strokeWidth={2} dot={false} name={stk.ticker+" Price"} />
                    {stk2 && <Line type="monotone" dataKey="stock2Px" stroke={C.tf} strokeWidth={2} dot={false} name={stk2.ticker+" Price"} strokeDasharray="4 2" />}
                    <ReferenceLine y={params.target} stroke={C.accent} strokeDasharray="6 3" />
                    <ReferenceLine y={stk.price} stroke={C.muted} strokeDasharray="3 3" />
                    {assigns.map((a,i)=><ReferenceLine key={i} x={a.month} stroke={a.assignment.includes("Put")?C.red:C.bh} strokeDasharray="2 2" strokeOpacity={0.4} />)}
                  </ComposedChart>
                </ResponsiveContainer>
                <div style={{display:"flex",gap:14,marginTop:6}}>
                  <span style={{fontSize:10,color:C.red}}>| Put Assignment</span>
                  <span style={{fontSize:10,color:C.bh}}>| Call Assignment</span>
                </div>
              </div>
            )}

            {tab==="premium" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,marginBottom:2,color:C.text}}>Monthly Premium Income</div>
                    <div style={{fontSize:11,color:C.dim}}>Total: {fmt(totalPrem)} (pre-tax)</div>
                  </div>
                </div>
                <ResponsiveContainer width="100%" height={360}>
                  <BarChart data={prems}>
                    <XAxis dataKey="month" stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} />
                    <YAxis stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} tickFormatter={fmt} />
                    <Tooltip content={<CTip C={C}/>} />
                    <Bar dataKey="prem" fill={C.wheel} radius={[2,2,0,0]} name={stk.ticker} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            )}

            {tab==="mc" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,marginBottom:2,color:C.text}}>Monte Carlo: {mcRuns} Runs</div>
                    <div style={{fontSize:11,color:C.dim}}>Avg Wheel CAGR: {pct(mc.avg.wheelCAGR)} · Avg B&H: {pct(mc.avg.bhCAGR)}</div>
                  </div>
                  <SmallBtn C={C} onClick={exportMcCSV}>Export CSV</SmallBtn>
                </div>
                <ResponsiveContainer width="100%" height={340}>
                  <BarChart data={mc.results} barGap={2}>
                    <XAxis dataKey="run" stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} />
                    <YAxis stroke={C.borderL} tick={{fill:C.muted,fontSize:10}} tickFormatter={fmt} />
                    <Tooltip content={<CTip C={C}/>} />
                    <Bar dataKey="wheel" fill={C.wheel} radius={[3,3,0,0]} name="Wheel" fillOpacity={0.7} />
                    <Bar dataKey="buyHold" fill={C.bh} radius={[3,3,0,0]} name="B&H" fillOpacity={0.5} />
                    <ReferenceLine y={mc.avg.wheel} stroke={C.wheel} strokeDasharray="6 3" />
                    <ReferenceLine y={mc.avg.buyHold} stroke={C.bh} strokeDasharray="6 3" />
                  </BarChart>
                </ResponsiveContainer>

                {/* Risk Metrics */}
                <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:100,background:C.bg,border:"1px solid "+C.border,borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Sharpe Ratio</div>
                    <div style={{fontSize:18,fontWeight:700,color:mc.avg.sharpe>1?C.green:mc.avg.sharpe>0.5?C.bh:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{mc.avg.sharpe.toFixed(2)}</div>
                  </div>
                  <div style={{flex:1,minWidth:100,background:C.bg,border:"1px solid "+C.border,borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Max Drawdown</div>
                    <div style={{fontSize:18,fontWeight:700,color:mc.avg.maxDD<0.2?C.green:mc.avg.maxDD<0.4?C.bh:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{pct(mc.avg.maxDD)}</div>
                  </div>
                  <div style={{flex:1,minWidth:100,background:C.bg,border:"1px solid "+C.border,borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Win vs B&H</div>
                    <div style={{fontSize:18,fontWeight:700,color:mc.winRate>0.5?C.green:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{pct(mc.winRate)}</div>
                  </div>
                </div>

                <div style={{marginTop:16,overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
                    <thead><tr style={{borderBottom:"1px solid "+C.borderL}}>
                      {["Strategy","Avg Final","Avg CAGR","Best","Worst"].map(h=>(
                        <th key={h} style={{padding:"7px 10px",textAlign:"left",color:C.muted,fontWeight:600,fontSize:9,textTransform:"uppercase",letterSpacing:1}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {[{n:"Wheel",c:C.wheel,k:"wheel",ck:"wheelCAGR"},{n:"Tax-Free",c:C.tf,k:"taxFree",ck:"tfCAGR"},{n:"RE+Div",c:C.re,k:"reDiv",ck:"reCAGR"},{n:"B&H",c:C.bh,k:"buyHold",ck:"bhCAGR"}].map(s=>{
                        const vals=mc.results.map(r=>r[s.k]);
                        return(<tr key={s.n} style={{borderBottom:"1px solid "+C.border}}>
                          <td style={{padding:"7px 10px",display:"flex",alignItems:"center",gap:6}}>
                            <div style={{width:8,height:8,borderRadius:2,background:s.c}}/><span style={{color:s.c,fontWeight:600}}>{s.n}</span></td>
                          <td style={{padding:"7px 10px",color:C.text}}>{fmt(mc.avg[s.k])}</td>
                          <td style={{padding:"7px 10px",color:mc.avg[s.ck]>0?C.green:C.red}}>{pct(mc.avg[s.ck])}</td>
                          <td style={{padding:"7px 10px",color:C.green}}>{fmt(Math.max(...vals))}</td>
                          <td style={{padding:"7px 10px",color:C.red}}>{fmt(Math.min(...vals))}</td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {tab==="ledger" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,marginBottom:2,color:C.text}}>Monthly Ledger (Run #1)</div>
                    <div style={{fontSize:11,color:C.dim}}>Scroll to explore</div>
                  </div>
                  <SmallBtn C={C} onClick={exportLedgerCSV}>Export CSV</SmallBtn>
                </div>
                <div style={{overflowX:"auto",maxHeight:460,overflowY:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",width:"100%"}}>
                    <thead style={{position:"sticky",top:0,zIndex:1}}>
                      <tr style={{background:C.cardH}}>
                        {["Mo",stk.ticker+" $","Shares","CC","CSP","Cash","Wheel","TaxFree","RE+Div","B&H","Event"].map(h=>(
                          <th key={h} style={{padding:"7px 8px",textAlign:"right",color:C.muted,fontWeight:600,fontSize:9,textTransform:"uppercase",letterSpacing:.5,borderBottom:"1px solid "+C.borderL}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {single.map((r,i)=>(
                        <tr key={i} style={{borderBottom:"1px solid "+C.border,background:i%2?"transparent":C.bg+"60"}}>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.dim}}>{r.month}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.green}}>${r.stockPx.toFixed(2)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.text}}>{r.sh.toLocaleString()}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.accent}}>{r.cQ}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.re}}>{r.pQ}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.dim}}>{fmt(r.cash)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.wheel,fontWeight:600}}>{fmt(r.wheel)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.tf}}>{fmt(r.taxFree)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.re}}>{fmt(r.reDiv)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.bh}}>{fmt(r.buyHold)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:r.assignment.includes("Put")?C.red:r.assignment.includes("Call")?C.bh:C.muted,fontSize:9}}>{r.assignment||"-"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      <div style={{textAlign:"center",marginTop:24,fontSize:10,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>
        Wheel Strategy Simulator · For educational purposes only · Not financial advice
        <div style={{marginTop:4}}>Code by Kyoo · Built by Mang</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
